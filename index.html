<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개와 말의 정성 - 플레이어</title>
    <style>
        /* 기본 전체 화면 세팅 및 주변부 암전 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0c0c14; }
        
        /* [컴팩트 비주얼 노벨 뷰어 프레임] 대사창 가로폭 찢어짐 차단 */
        .player-frame-container {
            position: relative;
            max-width: 850px;       
            width: 100%;
            height: 100%;
            margin: 0 auto;         
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7); 
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="player-frame-container">
        <iframe 
            src="https://ohohod.github.io/vnlog/embed?json=https://raw.githubusercontent.com/vaniling16-byte/humbleservice/main/buri.json&autoplay=true" 
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
    </div>
</body>
</html>
