<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>개와 말의 정성 - 플레이어</title>
    <style>
        /* 기본 전체 화면 세팅 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a2e; }
        
        /* 플레이어 컨테이너 감싸기 */
        .player-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* ========================================================================
           [대사창 가로폭 컴팩트 오버라이드 마스크]
           화면이 너무 넓어질 때 대사창과 전체 레이아웃을 강제로 가운데로 모아줍니다.
           ========================================================================
        */
        @media (min-width: 800px) {
            .player-wrapper {
                max-width: 850px;       /* 대사창이 퍼지는 최대 길이를 850px로 제한 */
                margin: 0 auto;         /* 화면 가운데로 정렬 */
                box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); /* 양옆 여백 경계선 음영 효과 */
            }
            body {
                background-color: #11111a; /* 화면이 넓어질 때 좌우 남는 배경색 */
            }
        }
    </style>
</head>
<body>
    <div class="player-wrapper">
        <iframe src="https://ohohod.github.io/vnlog/embed?json=https://raw.githubusercontent.com/vaniling16-byte/humbleservice/main/my_editable_page_edited%20(1).json&autoplay=true" allow="autoplay" allowfullscreen></iframe>
    </div>
</body>
</html>
